# multica-skill workflow configuration
# Save as ~/.multica-skill/workflow.yaml (or set MULTICA_FLOW_CONFIG=/path/to/file)
#
# Format: simple "key: value" pairs, one per line. Comments with #.
# (We intentionally keep this flat so the multica-flow bash script doesn't need
#  a real YAML parser dependency.)

# Which Multica tool drives every phase.
# Valid values: claude-code | codex | cursor | copilot | gemini | hermes | ...
# (anything multica recognizes via `multica runtime list`)
tool: claude-code

# Per-phase agent slugs.
# Defaults to "<tool>-<phase>"; override here if you want different agents
# (e.g. claude for explore + codex for work + gemini for review).
agent_explorer:    claude-explorer
agent_implementer: claude-implementer
agent_reviewer:    claude-reviewer
agent_qa:          claude-qa
agent_learner:     claude-learner

# Optional: max consecutive QA failures before the ticket is auto-blocked.
# Counted from `## QA Failure #N` headers in the ticket comments.
qa_failure_limit: 3

# Optional: label prefix. Default `phase:`. Change only if you need to avoid
# clashing with an existing label scheme.
phase_label_prefix: phase:
